---
project: travel-english-planner
desc: ICLEA 2026 Journey & TTS Practice App
---
tech_stack:
  framework: "React 18 + Vite"
  styling: "Vanilla CSS"
  animations: "Framer Motion"
  icons: "Lucide React"
  utils: ["html2pdf.js", "Web Speech API"]
ui_ux:
  theme: "Opaque dark study UI"
  transitions: "Framer Motion fade/slide"
  responsive: true
  accessibility:
    - "No translucent glass panels"
    - "Solid backgrounds for long reading sessions"
    - "Avoid high-glow overlays behind text"
domain_models:
  ItineraryNode:
    fields: [id, date, time, title, location, city, attention, relatedScenarioIds]
  TimelineNode:
    fields: [id, title, bgImage, scriptData]
    data: ["桃園機場前泊", "TPE/KMJ 航班", "熊本接機", "市區飯店", "ICLEA2026", "機場飯店", "回程航班"]
  ScriptLine:
    fields: [speaker, text, translation]
  PhrasePair:
    fields: [speaker, text, zh]
    languages: ["en-US", "ja-JP"]
  VocabularyItem:
    fields: [en, jp, zh]
features:
  dynamic_timeline:
    trigger: "onClick(Node)"
    action: "Switch global background & load ScriptData"
  tts_engine:
    api: "window.speechSynthesis"
    controls: ["Play/Pause", "Rate Slider"]
    logic: "Select matching voice by language, fallback to browser default"
  pdf_export:
    api: "html2pdf.js"
    layout: "A4"
    hooks: 
      pre: "Hide Play/Export buttons via CSS/State"
      post: "Restore UI elements"
